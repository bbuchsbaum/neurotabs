spec_version: "0.1.0"
dataset_id: "fixture-invalid-json"
storage_profile: "table-package"

observation_table:
  path: "observations.csv"
  format: "csv"

row_id: "row_id"
observation_axes: ["subject"]

observation_columns:
  row_id:
    dtype: string
    nullable: false
  subject:
    dtype: string
    nullable: false
  payload:
    dtype: json
    nullable: true
  roi_1:
    dtype: float32
    nullable: false

features:
  roi_beta:
    logical:
      kind: vector
      axes: ["roi"]
      dtype: float32
      shape: [1]
    encodings:
      - type: columns
        binding:
          columns: ["roi_1"]
